name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ✅ هذا السطر هو الحل: يحاول استخدام الملف المحلي، وإذا لم يجده يستخدم نظام السيرفر
    - name: Build APK
      run: ./gradlew assembleDebug || gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GalilTV-Debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 5
